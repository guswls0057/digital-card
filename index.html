<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card</title>
    <style>
        /* Base Reset & Background */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Elements */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.4;
        }

        body::before {
            background: #3b82f6;
            top: 10%;
            left: 15%;
        }

        body::after {
            background: #8b5cf6;
            bottom: 15%;
            right: 20%;
        }

        /* Glassmorphism Card Style */
        .card {
            position: relative;
            z-index: 10;
            width: 380px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            color: white;
        }

        /* Hover Effect: Scale up & subtle glow */
        .card:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.7), 
                        0 0 20px rgba(59, 130, 246, 0.2);
        }

        /* Profile Image Placeholder */
        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
        }

        .profile-image svg {
            width: 60px;
            height: 60px;
            fill: rgba(255, 255, 255, 0.8);
        }

        /* Typography */
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        /* Contact Section */
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 16px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: color 0.2s;
        }

        .info-item:hover {
            color: #60a5fa;
        }

        .icon {
            width: 20px;
            height: 20px;
            opacity: 0.7;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                width: 90%;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- 프로필 이미지 자리 -->
        <div class="profile-image">
            <img src="./gemini.png">
    
        </div>

        <!-- 이름 및 한 줄 소개 -->
        <h1>윤현진 (Yun hyunjin)</h1>
        <p class="tagline">끊임없이 배우고 성장하는<br>프론트엔드 개발자입니다.</p>

        <!-- 연락처 정보 -->
        <div class="contact-info">
            <a href="guswls0057@gmail.com" class="info-item">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
                <span>guswls0057@gmail.com</span>
            </a>
            <div class="info-item">
                <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <span>Seoul, Republic of Korea</span>
            </div>
        </div>
    </div>

</body>
</html>
